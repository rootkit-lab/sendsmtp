<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-msg-id" content="{{uniq}}" />
  <title>{{asunto}}</title>
</head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#111827;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f0f2f5;padding:40px 16px;">
    <tr><td align="center">
      <table role="presentation" width="520" cellspacing="0" cellpadding="0" style="max-width:520px;width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:10px;">
        <tr><td style="height:4px;background:#1d4ed8;font-size:0;">&nbsp;</td></tr>
        <tr><td style="padding:28px 28px 8px;">
          <p style="margin:0 0 12px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6b7280;font-weight:600;">
            {Factura electrónica|Comprobante fiscal}
          </p>
          <h1 style="margin:0 0 12px;font-size:22px;line-height:1.25;">Tu factura está lista</h1>
          <p style="margin:0 0 16px;font-size:15px;line-height:1.55;color:#374151;">
            Hola, <strong>{{email}}</strong>. El comprobante fiscal de tu compra ya está disponible para descargar.
          </p>
          <p style="margin:0 0 24px;">
            <a href="{{link}}" style="display:inline-block;background:#1d4ed8;color:#fff;text-decoration:none;padding:12px 18px;border-radius:8px;font-weight:600;font-size:14px;">Descargar factura</a>
          </p>
          <p style="margin:0;font-size:12px;color:#6b7280;">Doc. {{uniq}} · <span data-from>{{from}}</span></p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
