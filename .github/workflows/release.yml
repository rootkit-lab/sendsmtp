name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI + nfpm
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.88
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Frontend deps
        run: cd frontend && npm ci

      - name: Build .deb
        run: wails3 task linux:create:deb

      - name: List artifacts
        run: ls -lah bin/

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: bin/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: sendsmtp-linux-deb
          path: bin/*.deb

  apt-repo:
    needs: linux-deb
    runs-on: ubuntu-24.04
    # Publishes a GPG-signed APT tree to the gh-pages branch (GitHub Pages).
    # Requires secret APT_GPG_PRIVATE_KEY (see scripts/apt-gen-gpg-key.sh).
    env:
      APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
      APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no signing key
        id: gate
        run: |
          if [ -z "${APT_GPG_PRIVATE_KEY}" ]; then
            echo "APT_GPG_PRIVATE_KEY not set — skipping APT publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install apt tools
        if: steps.gate.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y apt-utils gnupg dpkg-dev

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          name: sendsmtp-linux-deb
          path: incoming-deb

      - name: Checkout existing gh-pages pool
        if: steps.gate.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-old

      - name: Build signed APT repository
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          chmod +x scripts/apt-build-repo.sh
          mkdir -p apt-out/pool/main
          if [ -d gh-pages-old/pool/main ]; then
            cp -f gh-pages-old/pool/main/*.deb apt-out/pool/main/ 2>/dev/null || true
          fi
          ./scripts/apt-build-repo.sh incoming-deb apt-out
          if [ -f build/apt/pubkey.gpg ]; then
            cp -f build/apt/pubkey.gpg apt-out/pubkey.gpg
            cp -f build/apt/pubkey.asc apt-out/pubkey.asc
          fi
          ls -lahR apt-out | head -80

      - name: Deploy to gh-pages
        if: steps.gate.outputs.skip != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt-out
          publish_branch: gh-pages
          force_orphan: false
          enable_jekyll: false
          keep_files: false

  windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install tools
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.88
          choco install wixtoolset nsis -y
        shell: bash

      - name: Frontend deps
        run: cd frontend && npm ci
        shell: bash

      - name: Build Windows exe + MSI + NSIS
        shell: bash
        run: |
          export PATH="$HOME/go/bin:/c/Program Files (x86)/WiX Toolset v3.14/bin:/c/Program Files (x86)/NSIS:$PATH"
          wails3 task windows:build ARCH=amd64
          candle -arch x64 -out bin/sendsmtp.wixobj build/windows/msi/sendsmtp.wxs
          light -out bin/sendsmtp-amd64.msi bin/sendsmtp.wixobj
          wails3 task windows:create:nsis:installer ARCH=amd64
          ls -lah bin/

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            bin/*.msi
            bin/*installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: sendsmtp-windows
          path: |
            bin/*.msi
            bin/*installer.exe
            bin/sendsmtp.exe
