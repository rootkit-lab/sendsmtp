name: "sendsmtp"
arch: ${GOARCH}
platform: "linux"
version: "0.1.2"
section: "mail"
priority: "optional"
maintainer: "SendSMTP <noreply@github.com>"
description: |
  Desktop SMTP campaign tool (Wails + React + SQLite).
  Import SMTPs, manage email queues, and send campaigns.
vendor: "SendSMTP"
homepage: "https://github.com/rootkit-lab/sendsmtp"
license: "MIT"
release: "1"

contents:
  - src: "./bin/sendsmtp"
    dst: "/usr/local/bin/sendsmtp"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/sendsmtp.png"
  - src: "./build/linux/sendsmtp.desktop"
    dst: "/usr/share/applications/sendsmtp.desktop"

depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0

overrides:
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1
  archlinux:
    depends:
      - gtk3
      - webkit2gtk-4.1

scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
